spring.datasource.url=jdbc:h2:mem:perfume_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.naver.client-id=test-naver-client-id
spring.security.oauth2.client.registration.naver.client-secret=test-naver-client-secret
spring.security.oauth2.client.registration.naver.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

app.auth.jwt.secret=01234567890123456789012345678901
app.auth.jwt.access-token-validity=1h
app.auth.cookie.name=PERFUME_ACCESS_TOKEN
app.auth.cookie.secure=false
app.auth.cookie.same-site=Lax
app.oauth2.success-redirect-uri=http://localhost:3000/oauth2/success
app.oauth2.failure-redirect-uri=http://localhost:3000/oauth2/failure
app.cors.allowed-origins=http://localhost:3000

app.r2.account-id=test-account
app.r2.access-key-id=test-access-key
app.r2.secret-access-key=test-secret-key
app.r2.bucket=test-bucket
app.r2.public-base-url=https://cdn.example.com
app.r2.key-prefix=profile-images
app.r2.max-size=5MB
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
